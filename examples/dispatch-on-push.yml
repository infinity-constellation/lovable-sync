# Example: Place this in the Lovable-connected repo at .github/workflows/dispatch-sync.yml
#
# On every push to main (which Lovable triggers), this fires a repository_dispatch
# event to the production repo, which in turn triggers the sync workflow.
#
# Auth: GitHub App (recommended) or PAT with repo scope on the production repo.
#
name: Dispatch Lovable Sync

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - 'postcss.config.js'
      - 'tsconfig*.json'
      - 'components.json'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      # GitHub App auth (recommended):
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.LOVABLE_SYNC_APP_ID }}
          private-key: ${{ secrets.LOVABLE_SYNC_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Trigger sync in production repo
        uses: peter-evans/repository-dispatch@v3
        with:
          repository: your-org/your-production-repo
          token: ${{ steps.app-token.outputs.token }}
          # OR for PAT auth: token: ${{ secrets.SYNC_DISPATCH_TOKEN }}
          event-type: lovable-sync
          client-payload: |
            {
              "source_repo": "${{ github.repository }}",
              "source_sha": "${{ github.sha }}",
              "source_ref": "${{ github.ref }}",
              "source_message": "${{ github.event.head_commit.message }}"
            }
