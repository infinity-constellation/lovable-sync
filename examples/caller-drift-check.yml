# Example: Place this in the production repo at .github/workflows/lovable-drift-check.yml
#
# Checks for drift between the Lovable source and this production repo.
# Runs on a schedule and can be triggered manually.
#
name: Lovable Drift Check

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC

permissions:
  contents: read

jobs:
  drift-check:
    uses: infinity-constellation/lovable-sync/.github/workflows/drift-check.yml@main
    secrets:
      # GitHub App auth (recommended):
      app_id: ${{ secrets.LOVABLE_SYNC_APP_ID }}
      app_private_key: ${{ secrets.LOVABLE_SYNC_APP_PRIVATE_KEY }}
      # OR PAT auth (legacy):
      # source_repo_token: ${{ secrets.LOVABLE_SYNC_TOKEN }}
